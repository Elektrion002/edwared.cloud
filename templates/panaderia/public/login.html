{% extends 'base.html' %}

{% block title %}Acceso Cliente | Panadería{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-20">
    <div class="glass-panel p-10 rounded-3xl text-center border-t border-white/10 shadow-xl shadow-cyan-900/20">
        
        <div class="w-20 h-20 bg-cyan-500/10 rounded-2xl mx-auto flex items-center justify-center mb-6">
            <svg class="w-10 h-10 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
        </div>

        <h2 class="text-3xl font-bold text-white mb-2">Acceso Recompensas</h2>
        <p class="text-slate-400 mb-8">Ingresa tus datos para ver tus puntos.</p>

        {% if messages %}
        <div class="bg-red-500/20 border border-red-500/50 text-red-200 p-3 rounded-lg mb-6 text-sm">
            {% for message in messages %}
                {{ message }}
            {% endfor %}
        </div>
        {% endif %}

        <form method="POST" class="space-y-5 text-left">
            {% csrf_token %}
            <div>
                <label class="block text-slate-400 text-sm font-medium mb-2">Número Celular (10 dígitos)</label>
                <input type="text" name="telefono" required class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition">
            </div>
            <div>
                <label class="block text-slate-400 text-sm font-medium mb-2">PIN Personal (4 dígitos)</label>
                <input type="password" name="pin_seguridad" maxlength="4" required class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition text-center tracking-widest text-lg font-mono">
            </div>
            
            <button type="submit" class="w-full bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white font-bold py-4 rounded-xl transition shadow-lg mt-4">
                Ver Mi Credencial
            </button>
        </form>
    </div>
</div>
{% endblock %}
