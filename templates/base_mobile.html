<!doctype html>
<html lang="es-mx">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0f172a">
    <title>{% block title %}Edwared Cloud{% endblock %}</title>
    <!-- Tailwind CSS desde el CDN para diseño ágil y elegante -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #0c111c; /* Fondo más inmersivo oscuro */
        color: #f8fafc; /* Slate 50 */
        -webkit-tap-highlight-color: transparent; /* Quitar highlight azul en móviles */
      }
      .glass-panel {
        background: rgba(30, 41, 59, 0.6); /* Slate 800 transparente */
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      /* Animaciones sutiles para cargar la tarjeta */
      @keyframes floatUp {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      .animate-float-up {
        animation: floatUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      
      /* Ocultar scrollbar para un look más nativo de app */
      ::-webkit-scrollbar {
        width: 0px;
        background: transparent;
      }
    </style>
    {% block extra_head %}{% endblock %}
  </head>
  <body class="min-h-screen flex flex-col antialiased selection:bg-cyan-500/30 selection:text-cyan-200">
    
    <!-- Contenido Principal Mobile First -->
    <main class="flex-grow w-full max-w-lg mx-auto flex flex-col items-center justify-center min-h-screen relative overflow-x-hidden">
      {% block content %} {% endblock %}
    </main>

  </body>
</html>
