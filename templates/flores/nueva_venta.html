{% extends 'base.html' %}

{% block title %}Nueva Venta | Florería{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4">
    <div class="glass-panel p-6 rounded-3xl mb-6 flex items-center justify-between">
        <h1 class="text-xl font-bold">Generar Nota de Venta</h1>
        <a href="{% url 'flores:home' %}" class="text-slate-400 text-sm">Cancelar</a>
    </div>

    <form method="POST" class="space-y-4">
        {% csrf_token %}
        <div class="glass-panel p-6 rounded-3xl space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Cliente</label>
                <input type="text" name="cliente" placeholder="Nombre del cliente" class="w-full bg-slate-800 border-none rounded-xl p-4 text-white placeholder-slate-600 focus:ring-2 focus:ring-fuchsia-600 transition" required>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Producto</label>
                <select name="producto" class="w-full bg-slate-800 border-none rounded-xl p-4 text-white focus:ring-2 focus:ring-fuchsia-600 transition">
                    {% for p in productos %}
                        <option value="{{ p.id }}">{{ p.nombre }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Cantidad</label>
                    <input type="number" name="cantidad" value="1" class="w-full bg-slate-800 border-none rounded-xl p-4 text-white focus:ring-2 focus:ring-fuchsia-600 transition">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Precio U.</label>
                    <input type="number" step="0.01" name="precio" placeholder="$0.00" class="w-full bg-slate-800 border-none rounded-xl p-4 text-white focus:ring-2 focus:ring-fuchsia-600 transition">
                </div>
            </div>
        </div>

        <button type="submit" class="w-full bg-fuchsia-600 hover:bg-fuchsia-500 text-white font-black py-5 rounded-3xl shadow-xl transition-all active:scale-95">
            CONSOLIDAR VENTA
        </button>
    </form>
</div>
{% endblock %}
