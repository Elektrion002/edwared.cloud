{% extends 'base.html' %}

{% block title %}Cargar Inventario | Florería{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4">
    <div class="glass-panel p-6 rounded-3xl mb-6 flex items-center justify-between">
        <h1 class="text-xl font-bold">Carga de Viaje (Vehículo)</h1>
        <a href="{% url 'flores:home' %}" class="text-slate-400 text-sm">Cancelar</a>
    </div>

    <form method="POST" class="space-y-4">
        {% csrf_token %}
        <div class="glass-panel p-6 rounded-3xl space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Almacén de Origen</label>
                <select name="almacen" class="w-full bg-slate-800 border-none rounded-xl p-4 text-white focus:ring-2 focus:ring-fuchsia-600 transition" required>
                    {% for alm in almacenes %}
                        <option value="{{ alm.id }}">{{ alm.nombre }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Producto para el viaje</label>
                <select name="producto" class="w-full bg-slate-800 border-none rounded-xl p-4 text-white focus:ring-2 focus:ring-fuchsia-600 transition">
                    {% for p in productos %}
                        <option value="{{ p.id }}">{{ p.nombre }} ({{ p.categoria.nombre }})</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Cantidad a Cargar (Bodega -> Camión)</label>
                <input type="number" name="cantidad" value="100" class="w-full bg-slate-800 border-none rounded-xl p-4 text-white focus:ring-2 focus:ring-fuchsia-600 transition" required>
                <p class="text-[10px] text-slate-500 mt-2 italic">Este stock se descontará conforme generes notas en ruta.</p>
            </div>
        </div>

        <button type="submit" class="w-full bg-slate-700 hover:bg-slate-600 text-white font-black py-5 rounded-3xl shadow-xl transition-all active:scale-95">
            INICIAR CARGA DE VIAJE
        </button>
    </form>
</div>
{% endblock %}
