<!doctype html>
<html lang="es-mx">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Edwared Cloud{% endblock %}</title>
    <!-- Tailwind CSS desde el CDN para diseño ágil y elegante -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #0f172a; /* Slate 900 - dark mode elegante */
        color: #f8fafc; /* Slate 50 */
      }
      .glass-panel {
        background: rgba(30, 41, 59, 0.7); /* Slate 800 transparente */
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .gradient-text {
        background: linear-gradient(to right, #38bdf8, #818cf8);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
    </style>
    {% block extra_head %}{% endblock %}
  </head>
  <body class="min-h-screen flex flex-col antialiased">
    <!-- Navbar Master (Sólo visible en el Landing de Edwared Cloud) -->
    {% if request.path == '/' %}
    <nav
      class="glass-panel sticky top-0 z-50 px-6 py-4 flex justify-between items-center"
    >
      <div class="text-2xl font-bold tracking-tight">
        <span class="gradient-text">EDWARED</span> CLOUD
      </div>
      <div class="space-x-4">
        <a href="#" class="text-slate-300 hover:text-white transition"
          >Sistemas</a
        >
        <a href="#" class="text-slate-300 hover:text-white transition"
          >Contacto</a
        >
        <a
          href="/admin"
          class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-lg font-medium transition shadow-lg shadow-indigo-500/30"
          >Módulo Admin</a
        >
      </div>
    </nav>
    {% endif %}

    <!-- Contenido Principal -->
    <main class="flex-grow container mx-auto px-4 py-12">
      {% block content %} {% endblock %}
    </main>

    <!-- Footer -->
    <footer class="py-8 text-center text-slate-500 text-sm">
      <p>
        &copy; {% now "Y" %} Edwared Cloud Platforms. Todos los derechos
        reservados.
      </p>
    </footer>
  </body>
</html>
